name: rubys

services:
  ruby-vibe-linux:
    container_name: ruby-vibe-linux
    build:
      context: ..
      dockerfile: dev-stack/Dockerfile.ruby-vibe-linux
    init: true
    shm_size: "1gb"
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__dbcnnstr: Host=postgres;Port=5432;Username=postgres;Password=AdminPassword!;Database=rubys
      Redis__Host: redis
      Redis__Port: 6379
      Redis__Password: ""
      Redis__Database: 0
      Redis__InstanceName: "RubyVibeLinuxTest:"
      VideoDownloader__Enabled: true
      VideoDownloader__PlaywrightHeadless: true
      VideoDownloader__DownloadPath: wwwroot/uploads
      VideoDownloader__StorePath: https://rubyvibeco.com/files/uploads/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./persistence_data/video-downloads:/app/wwwroot/uploads
      - ./persistence_data/discount:/app/wwwroot/discount
    networks:
      - rubys 

  postgres:
    image: postgres:17-alpine
    container_name: rubys-postgres

    environment:
      POSTGRES_DB: rubys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: AdminPassword!

    ports:
      - "5432:5432"

    volumes:
      - ./persistence_data/postgres:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d rubys"
        ]
      interval: 5s
      retries: 30
    networks:
      - rubys

  postgres-restore:
    image: postgres:17-alpine

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./postgres/backup:/backup

    entrypoint: >
      sh -c "
      pg_restore
      -h postgres
      -U postgres
      -d rubys
      --clean
      --if-exists
      /backup/rubys.backup
      "

    environment:
      PGPASSWORD: AdminPassword!

    restart: "no"
    networks:
      - rubys

