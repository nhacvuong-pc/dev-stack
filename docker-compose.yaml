  redis:
      image: redis:8-alpine
      container_name: rubys-redis
      command: ["redis-server", "--appendonly", "yes",
      #  "--requirepass", "${REDIS_PASSWORD:-redispassword}"
       ]
      ports:
        - "6379:6379"
      volumes:
        - ./persistence_data/redis:/data
      healthcheck:
        test:
          - CMD-SHELL
          - redis-cli -a "$${REDIS_PASSWORD:-redispassword}" ping | grep PONG
        interval: 10s
        timeout: 3s
        retries: 30
      networks:
        - rubys

